name: Build and Release Plugin

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.2.1)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Upload Plugin Release
    runs-on: ubuntu-latest

    steps:
      - name: Validate Inputs
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG_NAME="$INPUT_TAG"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          # Validate stable tag shape: vX.Y.Z
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag '$TAG_NAME' does not match stable semver pattern vX.Y.Z" >&2
            exit 1
          fi
          
          VERSION_FROM_TAG="${TAG_NAME#v}"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "VERSION_FROM_TAG=$VERSION_FROM_TAG" >> $GITHUB_ENV

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 0

      - name: Validate Version Alignment
        shell: bash
        run: |
          PKG_VER=$(jq -r .version package.json)
          PLG_VER=$(jq -r .version plugin.json)
          
          echo "Tag version: $VERSION_FROM_TAG"
          echo "package.json version: $PKG_VER"
          echo "plugin.json version: $PLG_VER"
          
          if [ "$TAG_NAME" != "v$PKG_VER" ]; then
            echo "Error: Tag name '$TAG_NAME' does not match version in package.json '$PKG_VER'" >&2
            exit 1
          fi
          if [ "$PLG_VER" != "$PKG_VER" ]; then
            echo "Error: plugin.json version '$PLG_VER' does not match package.json version '$PKG_VER'" >&2
            exit 1
          fi

      - name: Setup Toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Prepare Virtual Environment and Sync Dependencies
        run: |
          ./run.sh uv sync

      - name: Run Quality Gates
        run: |
          ./run.sh bash scripts/quality_gates.sh check

      - name: Package Plugin (Versioned Release)
        run: |
          ./run.sh uv run python scripts/package_plugin.py --release --release-version "${{ env.VERSION_FROM_TAG }}" --release-tag "${{ env.TAG_NAME }}" --versioned-output --emit-release-metadata --output-dir out

      - name: Validate Release Package ZIP
        run: |
          ./run.sh uv run python scripts/validate_plugin_zip.py "out/SDH-Ludusavi-${{ env.TAG_NAME }}.zip" --expected-version "${{ env.VERSION_FROM_TAG }}" --expected-name SDH-Ludusavi
          (cd out && sha256sum -c "SDH-Ludusavi-${{ env.TAG_NAME }}.zip.sha256")

      - name: Resolve Release Notes
        id: notes
        run: |
          python3 scripts/release_notes.py resolve "${{ env.TAG_NAME }}" --out-dir out

      - name: Publish Stable Release to GitHub
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ steps.notes.outputs.title }}
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: ${{ steps.notes.outputs.generate }}
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          overwrite_files: false
          files: |
            out/SDH-Ludusavi-${{ env.TAG_NAME }}.zip
            out/SDH-Ludusavi-${{ env.TAG_NAME }}.zip.sha256
            out/SDH-Ludusavi-${{ env.TAG_NAME }}.manifest.json

